<!DOCTYPE html>
<html>
    <head>
        <title>MayoPAC</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="">
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
                background: #f5f5f5;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }

            .chat-container {
                width: 100%;
                max-width: 430px;
                height: 95vh;
                background: white;
                border-radius: 20px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.1);
                display: flex;
                flex-direction: column;
                overflow: hidden;
            }

            /* Header */
            .header {
                background: linear-gradient(135deg, #2D1B4E 0%, #4A2D6E 100%);
                color: white;
                padding: 20px;
                text-align: center;
                font-size: 18px;
                font-weight: 600;
            }

            /* Welcome Section */
            .welcome {
                text-align: center;
                padding: 40px 20px;
            }

            .avatar {
                width: 80px;
                height: 80px;
                border-radius: 50%;
                margin: 0 auto 20px;
                background: linear-gradient(135deg, #2D1B4E 0%, #4A2D6E 100%);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 40px;
            }

            .welcome h2 {
                font-size: 24px;
                margin-bottom: 10px;
                color: #333
            }

            #chat-box {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }
            .message {
                max-width: 80%;
                padding: 12px 16px; 
                border-radius: 18px;
                line-height: 1.5;
                word-wrap: break-word;
            }

            .user {
                background: linear-gradient(135deg, #2D1B4E 0%, #4A2D6E 100%);
                color: white;
                align-self: flex-end;
                border-bottom-right-radius: 4px;
            }
            .agent {
                background: #f0f0f0;
                color: #333;
                align-self: flex-start;
                border-bottom-left-radius: 4px;
                white-space: pre-wrap;
            }

            /* Input Area */
            .input-container {
                padding: 20px;
                background: white;
                border-top: 1px solid #eee;
            }

            .input-wrapper{
                display: flex;
                gap: 10px;
                align-items: center;
                background: #f5f5f5;
                border-radius: 25px;
                padding: 8px 8px 8px 20px;

            }


            #question {
                flex: 1;
                border: none;
                background: transparent;
                font-size: 15px;
                outline: none;
                color: #333;
            }
            #question::placeholder {
                color: #999;
            }

            #send-btn {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                border: none;
                background: linear-gradient(135deg, #2D1B4E 0%, #4A2D6E 100%);
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                transition: transform 0.2s;
            }
            
            #send-btn:hover {
                transform: scale(1.05);
            }

            #send-btn:active {
                transform: scale(0.95);
            }
            .quick-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
}

.action-btn {
    padding: 8px 16px;
    background: white;
    border: 2px solid #7B3FF2;
    color: #7B3FF2;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 500;
}

.action-btn:hover {
    background: linear-gradient(135deg, #2D1B4E 0%, #4A2D6E 100%);
    color: white;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(123, 63, 242, 0.3);
}

.action-btn:active {
    transform: translateY(0);
}

            /*Hide welcome when chat starts */
            .welcome.hidden {
                display: none;
            }

            /* loading indicator */
            .typing {
                padding: 12px 16px;
                background: #f0f0f0;
                border-radius: 18px;
                max-width: 80px;
                align-self: flex-start;
            }

            .typing span {
                display: inline-block;
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #999;
                margin: 0 2px;
                animation: typing 1.4s infinite;
            }

            .typing span:nth-child(2) {
                animation-delay: 0.2s;
            }
            .typing span:nth-child(3) {
                animation-delay: 0.4s;
            }
            @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        </style>
    </head>
    <body>
        <div class="chat-container">
            <div class="header">
                Mo - Your MAYOPAC Concierge!
            </div>
            <div class="welcome" id="welcome">
                <div class="avatar">🎭</div>
                <h2>Hi! I'm Mo,<br>Concierge</h2>
                <p>Your guide to finding the perfect show!</p>
            </div>

            <div id="chat-box"></div>

            <div class="input-container">
                <div class="quick-actions">
                    <button class="action-btn" data-question="What Broadway shows are available?">🎭 Broadway</button>
                    <button class="action-btn" data-question="What comedy shows do you have?">😂 Comedy</button>
                    <button class="action-btn" data-question="What shows are this weekend?">📅 This Weekend</button>
                    <button class="action-btn" data-question="What shows are good for families?">👨‍👩‍👧 Family Shows</button>
                </div>
                <div class="input-wrapper">
                    <input type="text" id="question" placeholder="Ask about shows...">
                    <button id="send-btn">➤</button>
                </div>
            </div>

        <script>
            const chatBox = document.getElementById('chat-box');
            const questionInput = document.getElementById('question');
            const sendBtn = document.getElementById('send-btn');
            const welcome = document.getElementById('welcome')

            async function sendMessage() {
                const question = questionInput.value.trim();
                if (!question) return;
                
                // Hide welcome on first message
                welcome.classList.add('hidden');

                // show user message
                addMessage(question, 'user');
                questionInput.value = '';

                // Show typing indicator
                const typingDiv = document.createElement('div');
                typingDiv.className = 'typing';
                typingDiv.innerHTML = '<span></span><span></span><span></span>';
                chatBox.appendChild(typingDiv);
                chatBox.scrollTop = chatBox.scrollHeight;

                // Call API
                try {
                    const response = await fetch(`https://web-production-068d0.up.railway.app/search?question=${encodeURIComponent(question)}`);
                    const data = await response.json();
                    typingDiv.remove();

                    //Show agent response
                    addMessage(data.answer, 'agent');   
                } catch (error) {
                    addMessage('Error: Could not reach the API', 'agent');
                }
            }

            function addMessage(text, sender) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${sender}`;
                messageDiv.textContent = text;
                chatBox.appendChild(messageDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            }

            sendBtn.addEventListener('click', sendMessage);
            questionInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            window.addEventListener('load', () => {
                setTimeout(() => {
                    addMessage("Hi! I'm Mo, your personal guide to the Mayo Arts Performing Center! 🎭\n\nI can help you find shows by month, genre, or venue. What are you looking for today?", 'agent');
                }, 1000);
            });

            document.querySelectorAll('.action-btn').forEach(button => {
                button.addEventListener('click', () => {
                    const question =button.getAttribute('data-question');
                    questionInput.value = question;
                    sendMessage();
                });  
            });
        </script>
        
        <script src="" async defer></script>
    </body>
</html>
